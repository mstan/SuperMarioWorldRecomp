[General]
# Automatically save state on quit and reload on start
Autosave = 0

# Disable the SDL_Delay that paces each frame (slightly better perf if your
# display is set to exactly 60hz; may desync audio on other displays)
DisableFrameDelay = 0

# Skip the launcher and boot straight to the game (the launcher's "Skip launcher"
# checkbox sets this). Run with --launcher, or set this back to 0, to show it again.
SkipLauncher = 0

[Graphics]
# Window size ( Auto or WidthxHeight )
WindowSize = Auto

# Fullscreen mode (0=windowed, 1=desktop fullscreen, 2=fullscreen w/mode change)
Fullscreen = 0

# Window scale (1=100%, 2=200%, 3=300%, etc.)
WindowScale = 3

# Use an optimized (but potentially more buggy) SNES PPU implementation
NewRenderer = 1

# Don't keep the aspect ratio
IgnoreAspectRatio = 0

# Enable this option to remove the sprite limits per scan line
NoSpriteLimits = 1

# View mode: Standard keeps the authentic 4:3 image, Fixed16x9 renders a fixed
# 16:9 view, and Adaptive follows the live window/fullscreen aspect ratio
# (256..446 pixels wide at the native 224-line height). SMW's spawn/cull logic
# is widened by the override layer (see overrides/) in either widescreen mode.
Widescreen = Standard

# Widescreen HUD: anchor the in-level status bar to the screen edges
# (player/lives far left, item box/timer centered, score/coins far right).
# 0 keeps the authentic centered 4:3 status bar. No effect unless
# Widescreen is Fixed16x9 or Adaptive.
WidescreenHud = 1

# Use either SDL, SDL-Software, or OpenGL as the output method
# SDL-Software rendering might give better performance on Raspberry pi.
OutputMethod = SDL

# Set to true to use linear filtering. Gives less crisp pixels. Works with SDL and OpenGL.
LinearFiltering = 0

# Set a glsl shader. Only supported with the OpenGL output method
# This can be the path to a .glsl or .glslp file
# Get them with: git clone https://github.com/snesrev/glsl-shaders
Shader = 

[Sound]
EnableAudio = 1

# DSP frequency in samples per second (e.g. 48000, 44100, 32000, 22050, 11025)
AudioFreq = 32040

# number of separate sound channels (1=mono, 2=stereo)
AudioChannels = 2

# Audio buffer size in samples (power of 2; e.g., 4096, 2048, 1024) [try 1024 if sound is crackly]. The higher the more lag before you hear sounds.
AudioSamples = 512

[KeyMap]
# CONTROLLER BUTTONS ARE CONFIGURED IN keybinds.ini, NOT HERE.
#
# keybinds.ini (auto-generated next to the executable on first run)
# owns the 12 SNES controller buttons (A/B/X/Y/L/R/Start/Select +
# d-pad) for both players. Edit that file and restart the game to
# remap a button.
#
# This [KeyMap] section configures system-level shortcuts only:
# state save/load, fullscreen toggle, pause, turbo, etc.
#
# Every hotkey the game responds to is listed here and rebindable.
# Prefix with Shift+/Ctrl+/Alt+ as needed; SDL key names (F1, Tab, p, ...).
# Leave a value empty to unbind the hotkey entirely (e.g. "DisplayPerf =").

Fullscreen = Alt+Return
Reset = Ctrl+r
Pause = Shift+p
PauseDimmed = p
Turbo = Tab
WindowBigger = Ctrl+Up
WindowSmaller = Ctrl+Down

VolumeUp = Shift+=
VolumeDown = Shift+-
# Toggle the FPS/perf readout (in-window or title bar).
DisplayPerf = f
# Switch between the old and new PPU renderer at runtime.
ToggleRenderer = r

Load =      F1,     F2,     F3,     F4,     F5,     F6,     F7,     F8,     F9,     F10
Save = Shift+F1,Shift+F2,Shift+F3,Shift+F4,Shift+F5,Shift+F6,Shift+F7,Shift+F8,Shift+F9,Shift+F10

[GamepadMap]
# Whether the gamepads will be enabled. The game will not use them unless they're on.
EnableGamepad1 = true
EnableGamepad2 = true

# Analog-stick deadzone as a percentage of full stick range (0-100), per player.
# Below this the left stick reports no d-pad direction. Editable in the launcher's
# Configure Controllers screen.
Deadzone = 30
DeadzoneP2 = 30

# Any keys used in KeyMap can be used also in this section.

# The shoulder button is called L1/Lb and L2, and the thumbstick button is called L3
Controls =   DpadUp, DpadDown, DpadLeft, DpadRight, Back, Start, B, A, Y, X, Lb, Rb

# For player 2.
ControlsP2 = DpadUp, DpadDown, DpadLeft, DpadRight, Back, Start, B, A, Y, X, Lb, Rb
