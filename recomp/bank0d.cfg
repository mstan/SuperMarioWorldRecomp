# tools/recomp/bank0d.cfg
# Bank $0D recompilation config for snesrecomp-v2 / Super Mario World (U)
#
# Usage:
#   python tools/recomp/recomp.py smw.sfc tools/recomp/bank0d.cfg -o src/gen/smw_0d_gen.c

bank = 0D

# Bank-wide: all functions with j/k param have Y=X on entry (callers do TAY before JSR)
default_init_y = x

# ORACLE BRIDGE: sync C pointer variables after writing raw DP bytes.
# ptr_lo_map16_data is a C uint8* maintained by the oracle runtime.
# The recompiler writes to g_ram[0x6B]/[0x6C] (the underlying DP bytes) but
# doesn't update the C pointer. These directives inject sync calls.
# REMOVE WHEN: all banks are recompiled and oracle is fully replaced.
dp_sync 6B dp_sync_map16_ptr
dp_sync 6C dp_sync_map16_ptr
dp_sync 04 dp_sync_map16_ptr_bak
dp_sync 05 dp_sync_map16_ptr_bak

comment = Generated by snesrecomp-v2 from ROM bank $0D

includes = common_rtl.h funcs.h smw_rtl.h variables.h consts.h

