# tools/recomp/bank0d.cfg
# Bank $0D recompilation config for snesrecomp-v2 / Super Mario World (U)
#
# Usage:
#   python snesrecomp/tools/v2_emit.py --rom smw.sfc --cfg-dir recomp --out-dir src/gen

bank = 0D

# default_init_y = x  -- DROPPED 2026-04-30 with v2 (M, X) per-variant codegen
# The init_y hint was a v1 residual that papered over caller-context
# losing X→Y propagation. v2's CpuState.X/Y are runtime-authoritative,
# and the (M, X) variant scheme means callees see the caller's exact
# state. Re-add only if a real propagation regression emerges.

# dp_sync oracle-era bridges removed 2026-04-20: the C pointer mirrors
# the bridges updated are no-ops now (ptr_lo_map16_data has no readers).
# The stubs in src/dp_sync_bridge.c stay until smw_0d_dispatch.c also
# stops calling dp_sync_map16_ptr_to_dp (see ISSUES.md).

comment = Generated by snesrecomp-v2 from ROM bank $0D

includes = common_rtl.h funcs.h smw_rtl.h variables.h consts.h

