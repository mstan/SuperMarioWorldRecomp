bank = 90
includes = common_rtl.h smw_rtl.h variables.h funcs.h consts.h

comment = Simultaneous co-op expansion code (FastROM bank $90)

# JML hook installed over the stock ProcessGameMode entry. The HLE preserves
# its paired-call semantics without carrying its two synthetic return frames
# across generated C function boundaries.
func CoopGameModeWrapper 803d end:8051
hle_func 803d HleCoopGameModeWrapper

# The selected stock game-mode handler RTSes to this synthetic continuation.
# It must be a dispatch-table entry so the NLR bridge resumes AOT code rather
# than interpreting the expansion bank as an unrecognised return target.
func CoopGameModeAfterDispatch 8051 end:8094

# The wrapper converts its original two-byte JSR return into an equivalent
# FastROM-bank RTL. At the C boundary the push/RTL pair is a net-zero stack
# adapter; the helper preserves M and canonicalizes the equivalent $80 ROM
# mirror to the LLE scheduler's $00 program bank before returning to the host.
func CoopReturnToHost 8094 end:8099
hle_func 8094 HleCoopReturnToHost

# The co-op player synchronizer is an expansion-ROM routine reached by JSR.
# Its complete return set is M1X1; declaring that ABI lets the surrounding
# wrapper remain AOT even when deeper sprite logic is conservatively LLE.
exit_mx_at 9080be 1 1
