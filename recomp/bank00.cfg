# HLE-replacement: the asm main loop at $806B-$8078 is `LDA $10 ; BEQ
# $806B ; CLI ; INC $13 ; JSR ProcessGameMode ; STZ $10 ; BRA $806B`
# — a busy-wait spinlock against an NMI flag. The runner replaces it
# with SmwRunOneFrameOfGame (host-driven frame pacing + I_NMI calls).
# v2 codegen treats cross-fn jumps into this range as `return to host`
# (see emit_function._goto_or_return). Without this directive, the
# JMP at the tail of I_RESET auto-promotes a bank_00_806B function
# whose recompiled body re-enters the spinlock from inside the
# C frame and hangs the watchdog at frame 0.
exclude_range 806B 8079

# HLE the SPC upload entry. SPC700UploadLoop ($00:8079, named
