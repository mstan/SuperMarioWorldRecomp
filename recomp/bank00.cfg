# UploadMusicBank*. At recompiled speed (lock-contended with the
# audio thread and one host-side touch per APU port access) it runs
# orders of magnitude slower than the watchdog allows. The runtime's
# RtlUploadSpcImageFromDp walks the standard length/target/data
# block stream pointed to by DP+0..2 directly into apu->ram and
# jumps apu->spc->pc to the terminator's entry — same byte-for-byte
# result, but in microseconds instead of seconds. The recompiled
# parents (UploadSPCEngine, UploadSamples, etc.) keep their original
# bodies; only the inner SPC700UploadLoop body is HLE'd.
