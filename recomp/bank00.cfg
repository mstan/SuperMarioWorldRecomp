# ROM reset handler at $8000 (SMWDisX I_RESET). Init-only slice: the
# body runs $8000-$806A and intentionally excludes the GameLoop at
# $806B-$8078 (the main game loop — SmwRunOneFrameOfGame drives frame
# pacing instead). $806B-$8078 stays excluded as data-region.
