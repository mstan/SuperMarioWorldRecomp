# overruns into bank-internal data. The first 3 bytes decode as `BRL
# $1F78` but $1F78 is in unmapped LoROM-shadow space (PC < $8000),
# proving these bytes are data not code. data_region: directive
# below tells the dispatch-table reader to stop at this entry; the
# cf_debt_report UNRESOLVABLE_GOTO marker that previously surfaced
# from auto_059C60_M1X1 disappears as a result. No `func` entry —
# the bytes are not code.
