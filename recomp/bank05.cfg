# After the JSL $0086FA long-dispatch at $DAFB is a 9-byte dispatch table
# ($DAFF-DB07 → $DB3E/DB6E/DB82), followed by the three 18-byte ChocIsld2
# pointer arrays (Layer1 @ DB08, Sprites @ DB1A, Layer2 @ DB2C). Without
# this exclude_range the decoder walks past end:DAFF into the table bytes
# and emits RomPtr_A2(...) garbage (data decoded as code).

# The 3 dispatch handlers of the ChocIsld2 gimmick. Explicit entries are
# required because auto-detect_dispatch_helpers runs AFTER auto-promote,
# so discover_bank doesn't know JSL $0086FA is a long-dispatch when it
# traces LoadLevel_HandleChocolateIsland2Gimmick and wouldn't discover
# these handlers via the inline table.
func ChocIsld2_Layer1Handler                                     DB3E
func ChocIsld2_Shared_LoadPtrs                                   DB49
func ChocIsld2_SpriteHandler                                     DB6E
func ChocIsld2_Layer2Handler                                     DB82
