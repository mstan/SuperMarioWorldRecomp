bank = 10
includes = common_rtl.h smw_rtl.h variables.h funcs.h consts.h

comment = Simultaneous co-op expansion helpers

# The patch polls $4212 until H/V-blank ends. A compiled busy loop cannot
# yield for the PPU status transition, so replace it with an equivalent
# helper that performs the final register write and RTL stack effect.
func CoopWaitForBlank 8008 end:8015
hle_func 8008 HleCoopWaitForBlank

# Second expansion-bank entry discovered by analysis.
func CoopExpandedRoutine cbea
