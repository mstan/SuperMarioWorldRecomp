# The patched sprite-dispatch paths can non-locally return through the shared
# handler continuation. Let the interpreter own this routine's PHB/PLB frame
# while its ordinary sprite handlers continue to bounce to AOT bodies.
hle_func 808c HleCoopProcessNormalSprites

# The sprite loop's table-dispatched handlers all restore the M1X1 ABI before
# returning to the loop at $01:8127. Publish that shared handler boundary so
# ProcessNormalSprites itself is provable instead of tiering down across its
# PHB/PLB lifetime during level preparation.
exit_mx_at 018127 1 1
