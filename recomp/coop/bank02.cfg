# ParseLevelSpriteList and the shooter loader share a cyclic decode region;
# every real return from the shooter entry restores the M1X1 caller ABI.
exit_mx_at 02ab78 1 1

# Every cluster-sprite table target rejoins the M1X1 loop epilogue. Publishing
