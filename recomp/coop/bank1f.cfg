bank = 1f
includes = common_rtl.h smw_rtl.h variables.h funcs.h consts.h

comment = Co-op level-initialization return boundaries

# Lunar Magic's expanded level initialization uses these two helpers as
# dispatch-table targets. Each helper either returns through the parent JSL
# frame or falls through into a larger body. Keeping the branch adapter in HLE
# avoids carrying that non-local JSL return through an unpaired C tail call.
func CoopLevelInitConditionalAfterA7D9 ac93 end:ac9b entry_mx:1,1
hle_func ac93 HleCoopLevelInitConditionalAfterA7D9
func CoopLevelInitContinueAfterA7D9 ac9b entry_mx:1,1

func CoopLevelInitConditionalAfterA84D b042 end:b04a entry_mx:1,1
hle_func b042 HleCoopLevelInitConditionalAfterA84D
func CoopLevelInitContinueAfterA84D b04a entry_mx:1,1
